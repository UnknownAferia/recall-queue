services:
  vora-core:
    build: .
    env_file: .env
    command: npm run start
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.mjs", "core"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    volumes:
      - vora-core-logs:/app/logs

  vora-community:
    build: .
    env_file: .env
    command: npm run start:community
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.mjs", "community"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    volumes:
      - vora-community-logs:/app/logs

volumes:
  vora-core-logs:
  vora-community-logs:
