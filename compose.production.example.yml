x-vora-service: &vora-service
  image: vora:${VORA_IMAGE_TAG:-latest}
  build:
    context: .
    target: runtime
  env_file:
    - ${VORA_ENV_FILE:-.env}
  restart: unless-stopped
  init: true
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  stop_grace_period: 30s
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  vora-core:
    <<: *vora-service
    command: npm run start
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.mjs", "core"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    volumes:
      - vora-core-logs:/app/logs

  vora-community:
    <<: *vora-service
    command: npm run start:community
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.mjs", "community"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    volumes:
      - vora-community-logs:/app/logs

  vora-backup:
    <<: *vora-service
    profiles: [maintenance]
    command: npm run backup
    restart: "no"
    environment:
      VORA_BACKUP_DIRECTORY: /app/backups
    volumes:
      - ${VORA_BACKUP_DIRECTORY:-./backups}:/app/backups

  vora-backup-verify:
    <<: *vora-service
    profiles: [maintenance]
    command: npm run backup:verify
    restart: "no"
    environment:
      VORA_BACKUP_DIRECTORY: /app/backups
    volumes:
      - ${VORA_BACKUP_DIRECTORY:-./backups}:/app/backups:ro

  vora-backup-prune:
    <<: *vora-service
    profiles: [maintenance]
    command: npm run backup:prune
    restart: "no"
    environment:
      VORA_BACKUP_DIRECTORY: /app/backups
    volumes:
      - ${VORA_BACKUP_DIRECTORY:-./backups}:/app/backups

volumes:
  vora-core-logs:
  vora-community-logs:
